name: Deploy React App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh root@${{ secrets.SERVER_HOST }} << 'EOF'

          apt update
          apt install -y nginx git nodejs npm

          mkdir -p /var/www/shafransa
          cd /var/www/shafransa

          if [ ! -d ".git" ]; then
            git clone git@github.com:ZakirAliyev/shafransa.git .
          else
            git pull origin main
          fi

          npm install
          npm run build

          rm -rf /var/www/html/*
          cp -r build/* /var/www/html/ || cp -r dist/* /var/www/html/

          systemctl restart nginx

          EOF
